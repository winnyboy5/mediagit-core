min_version: 1.11.0

pre-commit:
  parallel: true
  commands:
    fmt-check:
      run: cargo fmt --check

    clippy:
      run: cargo clippy --workspace --all-targets -- -D warnings

  scripts:
    "check-license-headers.sh":
      runner: bash
    "check-file-size.sh":
      runner: bash
    "check-conflict-markers.sh":
      runner: bash

commit-msg:
  scripts:
    "validate-commit-msg.sh":
      runner: bash

pre-push:
  commands:
    test:
      run: cargo test --workspace
