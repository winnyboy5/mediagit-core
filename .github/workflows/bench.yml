name: Benchmarks

on:
  push:
    branches: [main]

# Required for benchmark-action to push results to gh-pages
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Run benchmarks
        run: |
          set -o pipefail
          # benchmark-action with tool:cargo expects the libtest/bencher format:
          #   test name ... bench:  123 ns/iter (+/- 4)
          # Criterion's default output (time: [low med high]) is NOT recognised.
          # --output-format=bencher makes Criterion emit the compatible format.
          # --color=never prevents ANSI codes from breaking the parser regex.
          cargo bench --workspace --benches --color=never \
            -- --output-format=bencher \
            | grep -vE '^(running [0-9]+ tests?|test result: ok\.)' \
            | tee output.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@mediagit-contributors"
