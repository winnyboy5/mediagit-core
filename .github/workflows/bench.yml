name: Benchmarks

on:
  push:
    branches: [main]

# Required for benchmark-action to push results to gh-pages
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Run benchmarks
        run: |
          set -o pipefail
          # Run Criterion benchmarks, filtering out the test-harness noise
          # that cargo emits (running N tests / test … ignored / test result).
          # Only clean Criterion output lands in output.txt for benchmark-action.
          cargo bench --workspace --benches \
            | grep -vE '^running [0-9]+ tests?$|^test .+ \.\.\. ignored$|^test result: ok\.' \
            | tee output.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@mediagit-contributors"
