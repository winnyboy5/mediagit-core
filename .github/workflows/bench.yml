name: Benchmarks

on:
  push:
    branches: [main]

# Required for benchmark-action to push results to gh-pages
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Run benchmarks
        env:
          CARGO_TERM_COLOR: never
        run: |
          set -o pipefail
          # benchmark-action with tool:cargo expects the libtest/bencher format:
          #   test name ... bench:  123 ns/iter (+/- 4)
          # Criterion's default output (time: [low med high]) is NOT recognised.
          # --output-format=bencher makes Criterion emit the compatible format.
          # CARGO_TERM_COLOR=never (step-level override) prevents ANSI codes.
          #
          # IMPORTANT: We must use --bench <name> for each [[bench]] target, NOT
          # --workspace --benches. The --benches flag includes lib/bin targets
          # (which use the default libtest harness and reject --output-format).
          # When adding a new [[bench]] target, add a --bench line here.
          cargo bench \
            --bench compression_bench \
            --bench metrics_overhead \
            --bench encryption_benchmark \
            --bench cache_bench \
            --bench branch_bench \
            --bench merge_bench \
            --bench odb_bench \
            --bench pack_benchmark \
            -- --output-format=bencher \
            | grep -E '^test .+ \.\.\. bench:' \
            | tee output.txt

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "Creating orphan gh-pages branch..."
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initial benchmark data branch"
            git push origin gh-pages
            git checkout main
          fi

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@mediagit-contributors"
