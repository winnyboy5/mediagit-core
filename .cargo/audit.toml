[advisories]
ignore = [
    # instant: unmaintained (RUSTSEC-2024-0384)
    # Pulled in transitively by azure_core 0.21 via http-types → futures-lite → fastrand → instant.
    # azure_storage_blobs 0.21.0 is the latest published Azure SDK for Rust; no upgrade path.
    "RUSTSEC-2024-0384",
    # bincode 1.3.3 unmaintained (RUSTSEC-2025-0141)
    # bincode is our on-disk binary format for commits, trees, manifests and chunks.
    # Migrating to postcard/bitcode would require a data-format migration breaking existing repos.
    # Upstream considers 1.3.3 feature-complete; no soundness issues reported.
    "RUSTSEC-2025-0141",
    # paste 1.0.15 unmaintained (RUSTSEC-2024-0436)
    # Pulled in transitively by azure_core 0.21 (and azure_storage, azure_storage_blobs).
    # azure_storage_blobs 0.21.0 is the latest published version; all 0.21.x Azure SDK crates use paste.
    # Fix requires waiting for a new Azure SDK release that drops paste.
    "RUSTSEC-2024-0436",
]
